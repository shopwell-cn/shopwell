<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shopwell administration</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon/favicon-32x32.png" id="dynamic-favicon">

    <script type="text/javascript">
        window._features_ = <%- featureFlags %>;

        <%- pageLoadingScreen.script %>
    </script>

    <style>
        <%- pageLoadingScreen.style %>
    </style>
</head>
<body>
    <div id="app"></div>

    <!-- loading indicator when network is very slow and vue hasn't already loaded. The component has been copied from mt-loader -->
    <%- pageLoadingScreen.markup %>

    <script type="text/javascript">
        window.startApplication = () => Shopwell.Application.start({
            appContext: {
                features: window._features_,
                firstRunWizard: false,
                systemCurrencyId: 'b7d2554b0ce847cd82f3ac9bd1c0dfca',
                systemCurrencyISOCode: 'EUR',
                adminEsEnable: false,
                storefrontEsEnable: false,
                productStreamIndexingEnabled: true,
                analyticsGatewayUrl: '<%- analyticsGatewayUrl %>',
            },
            apiContext: {
                host: 'localhost',
                basePath: '',
                pathInfo: '/',
                serviceRegistryUrl: '<%- serviceRegistryUrl %>',
            }
        });
    </script>
</body>
</html>

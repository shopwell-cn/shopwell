elasticsearch:
    enabled: "%env(bool:SHOPWELL_ES_ENABLED)%"
    indexing_enabled: "%env(bool:SHOPWELL_ES_INDEXING_ENABLED)%"
    indexing_batch_size: "%env(int:SHOPWELL_ES_INDEXING_BATCH_SIZE)%"
    hosts: "%env(string:OPENSEARCH_URL)%"
    index_prefix: "%env(string:SHOPWELL_ES_INDEX_PREFIX)%"
    throw_exception: "%env(string:SHOPWELL_ES_THROW_EXCEPTION)%"
    search:
        timeout: 5s
        term_max_length: 300
        search_type: "query_then_fetch"
    administration:
        hosts: "%env(string:ADMIN_OPENSEARCH_URL)%"
        enabled: "%env(bool:SHOPWELL_ADMIN_ES_ENABLED)%"
        indexing_batch_size: "%env(int:SHOPWELL_ADMIN_ES_INDEXING_BATCH_SIZE)%"
        refresh_indices: "%env(bool:SHOPWELL_ADMIN_ES_REFRESH_INDICES)%"
        index_prefix: "%env(string:SHOPWELL_ADMIN_ES_INDEX_PREFIX)%"
        throw_exception: "%env(string:SHOPWELL_ADMIN_ES_THROW_EXCEPTION)%"
        search:
            timeout: 5s
            term_max_length: 300
            search_type: "query_then_fetch"
        index_settings:
            number_of_shards: '%env(int-or-null:SHOPWELL_ADMIN_ES_NUMBER_OF_SHARDS)%'
            number_of_replicas: '%env(int-or-null:SHOPWELL_ADMIN_ES_NUMBER_OF_REPLICAS)%'
            'mapping.total_fields.limit': 50000
            'mapping.nested_fields.limit': 500
            'mapping.nested_objects.limit': 1000000
            max_result_window: 500000
        analysis:
            normalizer:
                sw_lowercase_normalizer:
                    type: custom
                    filter: [ 'lowercase' ]
            analyzer:
                sw_whitespace_analyzer:
                    type: custom
                    tokenizer: whitespace
                    filter: [ 'lowercase' ]
                sw_ngram_analyzer:
                    type: custom
                    tokenizer: whitespace
                    filter: [ 'lowercase', 'sw_ngram_filter' ]
            filter:
                sw_ngram_filter:
                    type: ngram
                    min_gram: "%env(int:SHOPWELL_ES_NGRAM_MIN_GRAM)%"
                    max_gram: "%env(int:SHOPWELL_ES_NGRAM_MAX_GRAM)%"
        dynamic_templates:
            - keywords:
                match_mapping_type: string
                mapping:
                    type: keyword
                    normalizer: sw_lowercase_normalizer
                    fields:
                        text:
                            type: text
    product:
        custom_fields_mapping:
        exclude_source: "%env(bool:SHOPWELL_ES_EXCLUDE_SOURCE)%"
    ssl:
        verify_server_cert: true
    index_settings:
        number_of_shards: '%env(int-or-null:SHOPWELL_ES_NUMBER_OF_SHARDS)%'
        number_of_replicas: '%env(int-or-null:SHOPWELL_ES_NUMBER_OF_REPLICAS)%'
        'mapping.total_fields.limit': 50000
        'mapping.nested_fields.limit': 500
        'mapping.nested_objects.limit': 1000000
        max_result_window: 10000
    analysis:
        normalizer:
            sw_lowercase_normalizer:
                type: custom
                filter: ['lowercase']
        analyzer:
            sw_whitespace_analyzer:
                type: custom
                tokenizer: whitespace
                filter: ['lowercase']
            sw_ngram_analyzer:
                type: custom
                tokenizer: whitespace
                filter: ['lowercase', 'sw_ngram_filter']
            sw_english_analyzer:
                type: custom
                tokenizer: whitespace
                filter: ['lowercase', 'sw_english_stop_filter']
            sw_german_analyzer:
                type: custom
                tokenizer: whitespace
                filter: ['lowercase', 'sw_german_stop_filter']
        filter:
            sw_ngram_filter:
                type: ngram
                min_gram: "%env(int:SHOPWELL_ES_NGRAM_MIN_GRAM)%"
                max_gram: "%env(int:SHOPWELL_ES_NGRAM_MAX_GRAM)%"
            sw_english_stop_filter:
                type: 'stop'
                stopwords: '_english_'
            sw_german_stop_filter:
                type: 'stop'
                stopwords: '_german_'
    language_analyzer_mapping:
        en: sw_english_analyzer
        de: sw_german_analyzer
        gsw: sw_german_analyzer
        nds: sw_german_analyzer
    use_language_analyzer: "%env(bool:SHOPWELL_ES_USE_LANGUAGE_ANALYZER)%"
    dynamic_templates:
        - keywords:
            match_mapping_type: string
            mapping:
                type: keyword
                normalizer: sw_lowercase_normalizer
                fields:
                    text:
                        type: text

parameters:
    default_elasticsearch_prefix: "sw"
    default_whitespace: " "
    env(SHOPWELL_ES_ENABLED): ""
    env(SHOPWELL_ES_INDEXING_ENABLED): ""
    env(OPENSEARCH_URL): ""
    env(SHOPWELL_ES_INDEX_PREFIX): "sw"
    env(SHOPWELL_ES_THROW_EXCEPTION): "1"
    env(SHOPWELL_ADMIN_ES_ENABLED): ""
    env(ADMIN_OPENSEARCH_URL): ""
    env(SHOPWELL_ADMIN_ES_INDEX_PREFIX): "sw-admin"
    env(SHOPWELL_ADMIN_ES_REFRESH_INDICES): ""
    env(SHOPWELL_ADMIN_ES_THROW_EXCEPTION): "1"
    env(SHOPWELL_ES_INDEXING_BATCH_SIZE): "100"
    env(SHOPWELL_ADMIN_ES_INDEXING_BATCH_SIZE): "1000"
    env(SHOPWELL_ES_EXCLUDE_SOURCE): "0"
    env(SHOPWELL_ES_NGRAM_MIN_GRAM): "4"
    env(SHOPWELL_ES_NGRAM_MAX_GRAM): "5"
    env(SHOPWELL_ES_USE_LANGUAGE_ANALYZER): "1"
    env(SHOPWELL_ES_NUMBER_OF_SHARDS): ""
    env(SHOPWELL_ES_NUMBER_OF_REPLICAS): ""
    # @deprecated tag:v6.8.0 - change SHOPWELL_ADMIN_ES_NUMBER_OF_SHARDS and SHOPWELL_ADMIN_ES_NUMBER_OF_REPLICAS to empty string to match regular Elasticsearch of Storefront config
    env(SHOPWELL_ADMIN_ES_NUMBER_OF_SHARDS): "3"
    env(SHOPWELL_ADMIN_ES_NUMBER_OF_REPLICAS): "3"


